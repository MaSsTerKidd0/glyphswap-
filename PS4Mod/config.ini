; ===========================================================================
;  PS4 Button Mod - configuration
;  Place this file (and your replacement images) in:  <game>\PS4Mod\
; ===========================================================================

[Settings]
; 1 = log every texture the game uploads, with its CRC32 hash + dimensions,
;     to PS4Mod\ps4mod_log.txt. Use this ONCE to discover the button atlas,
;     then set it back to 0 (logging every texture costs performance).
DumpTextures=1

[Replacements]
; ---- EXACT MATCH (preferred, precise) -----------------------------------
;   <hash> = <image file in the PS4Mod folder>
;   The hash comes from a [TEX] line in ps4mod_log.txt.
; 0xA1B2C3D4 = ps4_buttons.png

; ---- DIMENSION MATCH (discovery / testing only) -------------------------
;   <WIDTH>x<HEIGHT> = <image file>
;   Swaps ANY texture of that size. Point it at a solid magenta PNG to see
;   which on-screen elements light up, then pin the exact hash above.
; 1024x1024 = debug_magenta.png
