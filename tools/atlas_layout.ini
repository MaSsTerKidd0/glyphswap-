; ===========================================================================
;  atlas_layout.ini  —  how to stitch individual glyph PNGs into one atlas.
;  Consumed by tools\build_atlas.ps1.
;
;  This is a STARTING TEMPLATE. After the discovery step (DumpTextures=1) you
;  will know the original Xbox atlas's real size and the pixel cell each glyph
;  occupies. Edit [atlas] width/height and every glyph's x,y,w,h to match those
;  cells exactly — that alignment is what makes the swap land correctly.
; ===========================================================================

[atlas]
; Set these to the ORIGINAL atlas's dimensions (from a [TEX] line in the log).
width  = 1024
height = 1024
; Background as RRGGBBAA hex. Omit/blank = fully transparent (recommended).
; background = 00000000

[glyphs]
; name      = file,                x,    y,    w,    h
;   file    : a PNG inside tools\glyphs\ (rename your pack's files to match,
;             or change these names to your pack's filenames)
;   x, y    : top-left of the cell in the atlas (pixels)
;   w, h    : size to draw the glyph at (pixels) — scaled with clean bicubic
;
; The grid below is just a tidy 128px placeholder. Replace the numbers with the
; real cell coordinates you read from the dump for THIS game.

cross      = ps_cross.png,           0,    0,  128,  128
circle     = ps_circle.png,        128,    0,  128,  128
square     = ps_square.png,        256,    0,  128,  128
triangle   = ps_triangle.png,      384,    0,  128,  128
l1         = ps_l1.png,            512,    0,  128,  128
r1         = ps_r1.png,            640,    0,  128,  128
l2         = ps_l2.png,            768,    0,  128,  128
r2         = ps_r2.png,            896,    0,  128,  128

l3         = ps_l3.png,              0,  128,  128,  128
r3         = ps_r3.png,            128,  128,  128,  128
dpad       = ps_dpad.png,          256,  128,  128,  128
dpad_up    = ps_dpad_up.png,       384,  128,  128,  128
dpad_down  = ps_dpad_down.png,     512,  128,  128,  128
dpad_left  = ps_dpad_left.png,     640,  128,  128,  128
dpad_right = ps_dpad_right.png,    768,  128,  128,  128
options    = ps_options.png,       896,  128,  128,  128

share      = ps_share.png,           0,  256,  128,  128
touchpad   = ps_touchpad.png,      128,  256,  128,  128
ps         = ps_ps.png,            256,  256,  128,  128
