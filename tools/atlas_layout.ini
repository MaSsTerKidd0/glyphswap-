; ===========================================================================
;  atlas_layout.ini  —  how to stitch individual glyph PNGs into one atlas.
;  Consumed by tools\build_atlas.ps1.
;
;  Currently wired to the bundled Kenney "Input Prompts" PlayStation glyphs
;  (CC0) in tools\glyphs\. The grid below is a PLACEHOLDER (128px cells).
;
;  After the in-game discovery step (DumpTextures=1) you will know the original
;  Xbox atlas's real size and the pixel cell each glyph occupies. Edit
;  [atlas] width/height and every glyph's x,y,w,h to match those cells exactly —
;  that alignment is what makes the swap land correctly in-game.
; ===========================================================================

[atlas]
; Set these to the ORIGINAL atlas's dimensions (from a [TEX] line in the log).
width  = 1024
height = 1024
; Background as RRGGBBAA hex. Omit/blank = fully transparent (recommended).
; background = 00000000

[glyphs]
; name      = file,                                  x,    y,    w,    h
;   file    : a PNG inside tools\glyphs\  (Kenney source glyphs are 64x64)
;   x, y    : top-left of the cell in the atlas (pixels)
;   w, h    : size to draw the glyph at (scaled with clean bicubic)

; --- face buttons (colored) ---
cross      = playstation_button_color_cross.png,       0,    0,  128,  128
circle     = playstation_button_color_circle.png,    128,    0,  128,  128
square     = playstation_button_color_square.png,    256,    0,  128,  128
triangle   = playstation_button_color_triangle.png,  384,    0,  128,  128

; --- bumpers / triggers ---
l1         = playstation_trigger_l1.png,             512,    0,  128,  128
r1         = playstation_trigger_r1.png,             640,    0,  128,  128
l2         = playstation_trigger_l2.png,             768,    0,  128,  128
r2         = playstation_trigger_r2.png,             896,    0,  128,  128

; --- sticks / dpad ---
l3         = playstation_button_l3.png,                0,  128,  128,  128
r3         = playstation_button_r3.png,              128,  128,  128,  128
dpad       = playstation_dpad.png,                   256,  128,  128,  128
dpad_up    = playstation_dpad_up.png,                384,  128,  128,  128
dpad_down  = playstation_dpad_down.png,              512,  128,  128,  128
dpad_left  = playstation_dpad_left.png,              640,  128,  128,  128
dpad_right = playstation_dpad_right.png,             768,  128,  128,  128

; --- system ---
options    = playstation4_button_options.png,        896,  128,  128,  128
share      = playstation4_button_share.png,            0,  256,  128,  128
touchpad   = playstation4_touchpad.png,              128,  256,  128,  128
